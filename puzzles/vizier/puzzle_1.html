<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vizier's Puzzle</title>
</head>
<body>
    <p><img src="/images/sun_of_none.jpg" alt="sun_of_none"></p>
    <p>||Current payout if solved: [payout]</p>
    <input type="text" id="password" placeholder="Attempt to solve">
    <button onclick="checkInput()">Try</button>
    <p id="incorrect" style="color:red; display:none">You have not ascertained truth.</p>

    <script>
        function checkInput() {
            <!-- clever... but there is another mode of entry.-->
            password = "none"
            userInput = document.getElementById("password").value;

            if (userInput.trim().toLowerCase() == password.toLowerCase()) {
                window.location.href = "/puzzles/winner_page.html";
            } else {
                document.getElementById("incorrect").style.display = "block";
            }
        }
    </script>
</body>
</html>

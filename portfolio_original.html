<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/images/vortex.ico">
    <title>Portfolio</title>
    <style>
        body {
            background-color: black;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        p.channel {
            font-size: 24pt;
            color: white;
            text-align: center;
            font-family: Courier, monospace;
        }

        a {
            text-decoration: none;
        }

        a:link {
            color: rgb(129, 129, 215);
        }

        a:visited {
            color: rgb(0, 129, 215);
        }

        a:hover{
            color: rgb(137, 0, 80);
            border: 3px solid rgb(137, 0, 71);
        }

        a:active {
            color: rgb(0, 0, 0);
            border: 3px solid rgb(0, 0, 0);
        }
    </style>
</head>
<body>
    <p text-align: center style="color: white; font-size: 20px;">Caleb Holcomb Portfolio</p>
    <p text-align: center style="color: white">All media presented created by author</p>
    <video controls src="videos/themind_part2.mov" width = "500"></video>

</html>
